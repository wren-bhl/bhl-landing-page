kind = "web"
previewPath = "/hotel-landing/"
title = "BH Labs Hotels & Resorts Landing Page"
version = "1.0.0"
id = "artifacts/hotel-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/hotel-landing/" ]
localPort = 19405

[services.development]
run = "pnpm --filter @workspace/hotel-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hotel-landing", "run", "build" ]
publicDir = "artifacts/hotel-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19405"
BASE_PATH = "/hotel-landing/"
