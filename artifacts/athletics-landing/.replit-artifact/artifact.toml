kind = "web"
previewPath = "/athletics-landing/"
title = "BH Labs University Athletics Landing Page"
version = "1.0.0"
id = "artifacts/athletics-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/athletics-landing/" ]
localPort = 23881

[services.development]
run = "pnpm --filter @workspace/athletics-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/athletics-landing", "run", "build" ]
publicDir = "artifacts/athletics-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23881"
BASE_PATH = "/athletics-landing/"
