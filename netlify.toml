[build]
command = "pnpm run netlify:build"
publish = "artifacts/landing-pages/dist/public"
functions = "artifacts/landing-pages/netlify/functions"

[build.environment]
NODE_VERSION = "24"

[[redirects]]
from = "/api/contact"
to = "/.netlify/functions/contact"
status = 200

# SPA fallback
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
